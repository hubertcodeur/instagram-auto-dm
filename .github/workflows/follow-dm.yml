name: Follow DM

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: ig-bot
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: follow-dm-service/requirements.txt

      - name: Install dependencies
        run: pip install -r follow-dm-service/requirements.txt

      - name: Run poll
        env:
          SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:   ${{ secrets.SUPABASE_KEY }}
          IG_USERNAME:    ${{ secrets.IG_USERNAME }}
          IG_SESSION_ID:  ${{ secrets.IG_SESSION_ID }}
          IG_PASSWORD:    ${{ secrets.IG_PASSWORD }}
          NTFY_TOPIC:     ${{ secrets.NTFY_TOPIC }}
        run: python follow-dm-service/main.py

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST https://ntfy.sh/${{ secrets.NTFY_TOPIC }} \
            -H "Title: Bot Instagram ARRETE" \
            -H "Priority: urgent" \
            -H "Tags: warning,rotating_light" \
            -d "Workflow GitHub en echec. Verifier : https://github.com/hubertcodeur/instagram-auto-dm/actions"
