name: Weekly Stats

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: follow-dm-service/requirements.txt
      - run: pip install -r follow-dm-service/requirements.txt
      - name: Send weekly stats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NTFY_TOPIC:   ${{ secrets.NTFY_TOPIC }}
        run: python follow-dm-service/weekly_stats.py
